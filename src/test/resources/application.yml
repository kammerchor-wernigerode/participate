spring:
  application:
    name: participate

  main:
    banner-mode: off

  docker.compose.enabled: false

  datasource:
    url: jdbc:h2:mem:;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create

  liquibase.enabled: false

wicket:
  management:
    runtime-configuration: development

logging:
  level:
    root: warn
