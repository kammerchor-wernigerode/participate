<?xml version="1.0" encoding="UTF-8"?>
<wicket:panel xmlns:wicket="http://wicket.apache.org">
    <div wicket:id="tabs-container" class="tab-row">
        <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item" role="presentation" wicket:id="tabs">
                <button type="button" class="nav-link" role="tab" wicket:id="link">
                    <span wicket:id="title"></span>
                </button>
            </li>
        </ul>
    </div>

    <div class="mt-3" role="tabpanel" tabindex="0" wicket:id="panel"></div>
</wicket:panel>
