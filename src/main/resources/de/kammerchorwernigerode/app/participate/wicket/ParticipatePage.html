<!doctype html>
<html lang="en" xmlns:wicket="http://wicket.apache.org">
    <head>
        <meta charset="utf-8">
        <title>Participate</title>
    </head>
    <body>
        <wicket:extend>
            <nav class="navbar navbar-expand-sm bg-body-tertiary fixed-top">
                <div class="container">
                    <a href="#" class="navbar-brand" wicket:id="homeNavbarLink"></a>
                    <button type="button" class="navbar-toggler" data-bs-toggle="collapse"
                            aria-expanded="false" wicket:id="navbarToggler">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" wicket:id="navbarCollapse">
                        <ul class="navbar-nav me-auto mb-2 mb-sm-0">
                            <li class="nav-item">
                                <a href="#" wicket:id="eventsNavbarLink"></a>
                            </li>
                            <li class="nav-item">
                                <a href="#" wicket:id="personsNavbarLink"></a>
                            </li>
                        </ul>
                        <ul class="navbar-nav mb-2 mb-sm-0">
                            <li class="nav-item dropdown">
                                <a href="#" role="button" class="nav-link dropdown-toggle" data-bs-toggle="dropdown"
                                   aria-expanded="false">
                                    <i class="bi bi-person"></i>
                                    <span wicket:id="usernameLabel"></span>
                                </a>
                                <ul class="dropdown-menu">
                                    <li>
                                        <a href="#" target="_blank" class="dropdown-item"
                                           wicket:id="accountSettingsLink">
                                            <i class="bi bi-gear"></i>
                                            <wicket:message key="accountSettingsLink.body"></wicket:message>
                                        </a>
                                    </li>
                                    <li>
                                        <hr class="dropdown-divider">
                                    </li>
                                    <li>
                                        <a href="#" class="dropdown-item" wicket:id="signOutLink">
                                            <i class="bi bi-box-arrow-right"></i>
                                            <wicket:message key="signOutLink.body"></wicket:message>
                                        </a>
                                    </li>
                                </ul>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
            <main wicket:id="mainContainer">
                <wicket:child />
            </main>
        </wicket:extend>
    </body>
</html>
