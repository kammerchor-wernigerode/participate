<?xml version="1.0" encoding="UTF-8" ?>
<wicket:panel xmlns:wicket="http://wicket.apache.org">
    <tr>
        <td class="border-bottom-0" wicket:id="cell">
            <div class="d-flex flex-md-row flex-column align-items-md-center justify-content-between gap-2">
                <div wicket:id="pageSizeSelector"></div>
                <div class="d-flex flex-md-row flex-column align-items-md-center justify-content-between gap-2"
                     wicket:id="navigation">
                    <wicket:container wicket:id="label"></wicket:container>
                    <ul wicket:id="navigator"></ul>
                </div>
            </div>
        </td>
    </tr>
</wicket:panel>
