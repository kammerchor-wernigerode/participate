<?xml version="1.0" encoding="UTF-8" ?>
<wicket:panel xmlns:wicket="http://wicket.apache.org">
    <div class="toast-header">
        <strong class="me-auto" wicket:id="title"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" wicket:message="aria-label:close"
                wicket:id="closeButton">
        </button>
    </div>
    <div class="toast-body" wicket:id="body"></div>
</wicket:panel>
