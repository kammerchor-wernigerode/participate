<!doctype html>
<wicket:panel xmlns:wicket="http://wicket.apache.org">
    <wicket:container wicket:id="layout"></wicket:container>
    <div wicket:id="feedback"></div>

    <wicket:fragment wicket:id="default">
        <label class="form-label" wicket:id="label"></label>
        <div wicket:id="container">
            <textarea wicket:id="control"></textarea>
            <wicket:container wicket:id="endAdornment"></wicket:container>
        </div>
    </wicket:fragment>

    <wicket:fragment wicket:id="floatingLabel">
        <div wicket:id="container">
            <textarea wicket:id="control"></textarea>
            <wicket:container wicket:id="endAdornment"></wicket:container>
        </div>
        <label wicket:id="label"></label>
    </wicket:fragment>
</wicket:panel>
