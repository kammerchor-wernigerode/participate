<!doctype html>
<html lang="en" xmlns:wicket="http://wicket.apache.org">
    <body>
        <wicket:panel>
            <div class="mb-3">
                <h2 class="text-truncate">
                    <i class="bi bi-calendar-fill"></i>
                    <wicket:message key="events"></wicket:message>
                </h2>
            </div>

            <div class="d-flex flex-row align-items-center justify-content-between mb-3">
                <div class="d-flex flex-row align-items-center ms-auto">
                    <a href="#" class="btn btn-primary" wicket:id="createEventLink"></a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover" wicket:id="table"></table>
            </div>
        </wicket:panel>
    </body>
</html>
