<!doctype html>
<html lang="en" xmlns:wicket="http://wicket.apache.org">
    <head>
        <meta charset="utf-8">
    </head>
    <body>
        <wicket:extend>
            <div class="row">
                <div class="col-xl-7 d-flex flex-column">
                    <div class="mb-3">
                        <h2 class="text-truncate">
                            <i class="bi bi-calendar-fill"></i>
                            <wicket:message key="events"></wicket:message>
                        </h2>
                    </div>

                    <div wicket:id="events"></div>
                </div>

                <div class="col-xl-5 d-flex flex-column" wicket:id="event"></div>
            </div>
        </wicket:extend>
    </body>
</html>
