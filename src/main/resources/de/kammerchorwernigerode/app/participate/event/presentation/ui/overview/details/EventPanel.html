<!doctype html>
<html lang="en" xmlns:wicket="http://wicket.apache.org">
    <body>
        <wicket:panel>
            <div class="mb-3">
                <h2 class="text-truncate">
                    <i class="bi bi-chevron-right"></i>
                    <span wicket:id="title"></span>
                </h2>
            </div>

            <div class="d-flex flex-row align-items-center justify-content-between mb-3">
                <div class="d-flex flex-row align-items-center ms-auto">
                    <div class="btn-group" role="group" wicket:message="aria-label:EventPanel.event.actions">
                        <a href="#" class="btn btn-primary" wicket:id="eventDetailsLink"></a>
                        <button type="button" class="btn btn-primary dropdown-toggle dropdown-toggle-split"
                                data-bs-toggle="dropdown" aria-expanded="false">
                            <span class="visually-hidden">
                                <wicket:message key="Dropdown.toggle"></wicket:message>
                            </span>
                        </button>
                        <ul class="dropdown-menu">
                            <li>
                                <a href="#" class="dropdown-item" wicket:id="editEventLink"></a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <dl class="row">
                <dt class="col-sm-3 text-sm-end">
                    <wicket:message key="event.date"></wicket:message>:
                </dt>
                <dd class="col-sm-9" wicket:id="date"></dd>

                <dt class="col-sm-3 text-sm-end">
                    <wicket:message key="event.createdDate"></wicket:message>:
                </dt>
                <dd class="col-sm-9" wicket:id="createdDate"></dd>

                <wicket:enclosure>
                    <dt class="col-sm-3 text-sm-end">
                        <wicket:message key="event.location"></wicket:message>:
                    </dt>
                    <dd class="col-sm-9" wicket:id="location"></dd>
                </wicket:enclosure>

                <wicket:enclosure>
                    <dt class="col-sm-3 text-sm-end">
                        <wicket:message key="event.description"></wicket:message>:
                    </dt>
                    <dd class="col-sm-9" wicket:id="description"></dd>
                </wicket:enclosure>
            </dl>

            <div wicket:id="attendeeTablePanel"></div>
        </wicket:panel>
    </body>
</html>
