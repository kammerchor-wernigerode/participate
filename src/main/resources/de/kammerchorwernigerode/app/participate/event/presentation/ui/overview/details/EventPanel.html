<!doctype html>
<html lang="en" xmlns:wicket="http://wicket.apache.org">
    <body>
        <wicket:panel>
            <div class="mb-3">
                <h2 class="text-truncate">
                    <i class="bi bi-chevron-right"></i>
                    <span wicket:id="title"></span>
                </h2>
            </div>

            <div class="d-flex flex-row align-items-center justify-content-between mb-3">
                <div class="d-flex flex-row align-items-center ms-auto">
                    <div class="btn-group" role="group" wicket:message="aria-label:EventPanel.event.actions">
                        <a href="#" class="btn btn-primary" wicket:id="editEventLink"></a>
                    </div>
                </div>
            </div>

            <div wicket:id="attendeeTablePanel"></div>
        </wicket:panel>
    </body>
</html>
