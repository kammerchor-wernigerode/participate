<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="utf-8"/>
</head>
<body>
<wicket:panel>
    <wicket:extend>
        <form wicket:id="form">
            <input wicket:id="name">
            <input type="email" wicket:id="email">
            <input wicket:id="subject">
            <textarea wicket:id="message"></textarea>
            <div wicket:id="feedback"></div>
        </form>
    </wicket:extend>
</wicket:panel>
</body>
</html>
