volumes:
  postgres_data:

services:
  mariadb:
    profiles:
      - mariadb
    image: mariadb:10.11
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mariadb/dumps/:/docker-entrypoint-initdb.d/
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: 'yes'
      MARIADB_DATABASE: participate
      MARIADB_USER: participate
      MARIADB_PASSWORD: participate
      MARIADB_AUTO_UPGRADE: 'true'

  postgres:
    profiles:
      - postgres
    image: postgres:17.9-alpine
    environment:
      POSTGRES_PASSWORD: 3_dZ-LNHjRpe
      TZ: Europe/Berlin
    volumes:
      - postgres_data:/var/lib/postgresql/data/:rw
      - ./docker/postgres/provisioning/:/docker-entrypoint-initdb.d/:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 5s

  fakesmtp:
    image: ghusta/fakesmtp:2.3-jre17
    stop_signal: SIGKILL
    ports:
      - "587:25"
    volumes:
      - $HOME/received-emails/:/var/mail
